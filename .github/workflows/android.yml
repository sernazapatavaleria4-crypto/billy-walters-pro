name: Build APK

on:
  push:
    branches: [ main, principal ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses || true

      - name: Generate gradlew if missing
        run: |
          cd android
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, generating..."
            gradle wrapper --gradle-version=8.4
          fi
          chmod +x gradlew

      - name: Download Gradle Wrapper JAR if missing
        run: |
          mkdir -p android/gradle/wrapper
          if [ ! -f "android/gradle/wrapper/gradle-wrapper.jar" ]; then
            curl -fsSL "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -o /tmp/gradle.zip
            unzip -j /tmp/gradle.zip "gradle-8.4/lib/plugins/gradle-wrapper-*.jar" -d android/gradle/wrapper/ || \
            curl -fsSL "https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar" \
              -o android/gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BillyWaltersPRO-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
